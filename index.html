<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timepay gateway payment</title>

<style>
body{
  font-family: 'Segoe UI', sans-serif;
  background: #f2f4f8;
  padding: 20px;
}
.container{
  max-width: 500px;
  margin: auto;
}
.card{
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
  margin-bottom: 20px;
}
.header{
  background: linear-gradient(45deg,#2196F3,#1565C0);
  color: white;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  font-size: 18px;
  margin-bottom: 15px;
}
.row{
  display:flex;
  justify-content: space-between;
  margin: 10px 0;
  align-items:center;
  gap:10px;
}
.copy-btn{
  background:#2196F3;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}
.pay-btn{
  width:100%;
  background:#4CAF50;
  color:white;
  padding:12px;
  border:none;
  border-radius:8px;
  margin-top:10px;
  font-size:16px;
  cursor:pointer;
}
input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ddd;
  box-sizing:border-box;
}
.edit-box{
  background:#fafafa;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}
.generated-link{
  font-size:12px;
}
#toast{
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: white;
  padding: 10px 18px;
  border-radius: 25px;
  font-size: 14px;
  opacity: 0;
  transition: 0.3s ease;
  z-index: 9999;
}
#toast.show{
  opacity: 1;
}
.qr-box{
  text-align:center;
  margin-top:15px;
}
.qr-box img{
  width:200px;
}
</style>
</head>
<body>

<div class="container">

<!-- EDIT PANEL -->
<div class="card edit-box" id="editPanel">
  <h3>Payment Details</h3>
  <input type="text" id="nameInput" placeholder="Receiver Name" value="Your Business Name">
  <input type="number" id="amountInput" placeholder="Amount" value="1000">
  <input type="text" id="upiInput" placeholder="UPI ID" value="yourupi@bank">

  <button class="pay-btn" onclick="generateLink()">Generate Shareable Link</button>
  <input type="text" id="generatedLink" class="generated-link" readonly placeholder="Generated link will appear here">
</div>

<!-- PAYMENT CARD -->
<div class="card">
  <div class="header">Step 1: Complete Payment</div>

  <div class="row">
    <strong>Amount:</strong>
    <span id="amountDisplay">₹1000</span>
    <button class="copy-btn" onclick="copyText('amountDisplay')">Copy</button>
  </div>

  <div class="row">
    <strong>Name:</strong>
    <span id="nameDisplay">Your Business Name</span>
  </div>

  <div class="row">
    <strong>UPI ID:</strong>
    <span id="upiDisplay">yourupi@bank</span>
    <button class="copy-btn" onclick="copyText('upiDisplay')">Copy</button>
  </div>

  <button class="pay-btn" onclick="payNow()">Pay via UPI</button>

  <!-- QR CODE -->
  <div class="qr-box">
    <img id="qrImage" src="" alt="QR Code">
  </div>

</div>

<!-- UTR SECTION -->
<div class="card">
  <div class="header">Step 2: Submit UTR</div>
  <input type="text" id="utrInput" placeholder="Enter 12 Digit UTR">
  <button class="pay-btn" onclick="submitUTR()">Submit UTR</button>
</div>

</div>

<div id="toast">Copied</div>

<script>

window.onload = function(){
  const params = new URLSearchParams(window.location.search);
  let name = params.get("name");
  let amount = params.get("amount");
  let upi = params.get("upi");

  if(name && amount && upi){
    document.getElementById("editPanel").style.display = "none";
    document.getElementById("nameDisplay").innerText = name;
    document.getElementById("amountDisplay").innerText = "₹" + amount;
    document.getElementById("upiDisplay").innerText = upi;
    generateQR(upi, amount, name);
  } else {
    generateQR("yourupi@bank","1000","Your Business Name");
  }
};

function generateLink(){
  let name = document.getElementById("nameInput").value;
  let amount = document.getElementById("amountInput").value;
  let upi = document.getElementById("upiInput").value;

  document.getElementById("nameDisplay").innerText = name;
  document.getElementById("amountDisplay").innerText = "₹" + amount;
  document.getElementById("upiDisplay").innerText = upi;

  let baseUrl = window.location.origin + window.location.pathname;
  let newUrl = `${baseUrl}?name=${encodeURIComponent(name)}&amount=${amount}&upi=${encodeURIComponent(upi)}`;
  document.getElementById("generatedLink").value = newUrl;

  generateQR(upi, amount, name);
}

function generateQR(upi, amount, name){
  let upiLink = `upi://pay?pa=${upi}&pn=${name}&am=${amount}&cu=INR`;
  let qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(upiLink)}`;
  document.getElementById("qrImage").src = qrUrl;
}

function copyText(id){
  let text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text);
  showToast("Copied");
}

function showToast(message){
  let toast = document.getElementById("toast");
  toast.innerText = message;
  toast.classList.add("show");
  setTimeout(() => {
    toast.classList.remove("show");
  }, 2000);
}

function payNow(){
  let amount = document.getElementById("amountDisplay").innerText.replace("₹","");
  let upi = document.getElementById("upiDisplay").innerText;
  let name = document.getElementById("nameDisplay").innerText;
  let url = `upi://pay?pa=${upi}&pn=${name}&am=${amount}&cu=INR`;
  window.location.href = url;
}

function submitUTR(){
  let utr = document.getElementById("utrInput").value.trim();
  if(/^\d{12}$/.test(utr)){
    showToast("UTR Submitted Successfully");
  }else{
    showToast("UTR must be exactly 12 digits");
  }
}

</script>

</body>
</html>
