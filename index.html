<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Payment</title>

<style>
body{
  font-family: 'Segoe UI', sans-serif;
  background: #f2f4f8;
  padding: 20px;
}
.container{
  max-width: 500px;
  margin: auto;
}
.card{
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
  margin-bottom: 20px;
}
.header{
  background: linear-gradient(45deg,#2196F3,#1565C0);
  color: white;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  font-size: 18px;
  margin-bottom: 15px;
}
.row{
  display:flex;
  justify-content: space-between;
  margin: 10px 0;
  align-items:center;
}
.copy-btn{
  background:#2196F3;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}
.pay-btn{
  width:100%;
  background:#4CAF50;
  color:white;
  padding:12px;
  border:none;
  border-radius:8px;
  margin-top:10px;
  font-size:16px;
  cursor:pointer;
}
input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ddd;
}
.edit-box{
  background:#fafafa;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}
</style>
</head>
<body>

<div class="container">

<!-- EDIT PANEL -->
<div class="card edit-box">
  <h3>Edit Payment Details</h3>
  <input type="text" id="nameInput" placeholder="Receiver Name" value="Your Business Name">
  <input type="number" id="amountInput" placeholder="Amount" value="1000">
  <input type="text" id="upiInput" placeholder="UPI ID" value="yourupi@bank">
  <button class="pay-btn" onclick="updateDetails()">Update Details</button>
</div>

<!-- PAYMENT CARD -->
<div class="card">
  <div class="header">Step 1: Complete Payment</div>

  <div class="row">
    <strong>Amount:</strong>
    <span id="amountDisplay">₹1000</span>
    <button class="copy-btn" onclick="copyText('amountDisplay')">Copy</button>
  </div>

  <div class="row">
    <strong>Name:</strong>
    <span id="nameDisplay">Your Business Name</span>
  </div>

  <div class="row">
    <strong>UPI ID:</strong>
    <span id="upiDisplay">yourupi@bank</span>
    <button class="copy-btn" onclick="copyText('upiDisplay')">Copy</button>
  </div>

  <button class="pay-btn" onclick="payNow()">Pay via UPI</button>
</div>

<!-- UTR SECTION -->
<div class="card">
  <div class="header">Step 2: Submit UTR</div>
  <input type="text" id="utrInput" placeholder="Enter 12 Digit UTR">
  <button class="pay-btn" onclick="submitUTR()">Submit UTR</button>
</div>

</div>

<script>

function updateDetails(){
  let name = document.getElementById("nameInput").value;
  let amount = document.getElementById("amountInput").value;
  let upi = document.getElementById("upiInput").value;

  document.getElementById("nameDisplay").innerText = name;
  document.getElementById("amountDisplay").innerText = "₹" + amount;
  document.getElementById("upiDisplay").innerText = upi;

  alert("Details Updated Successfully");
}

function copyText(id){
  let text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text);
  alert("Copied: " + text);
}

function payNow(){
  let amount = document.getElementById("amountInput").value;
  let upi = document.getElementById("upiInput").value;
  let name = document.getElementById("nameInput").value;

  let url = `upi://pay?pa=${upi}&pn=${name}&am=${amount}&cu=INR`;
  window.location.href = url;
}

function submitUTR(){
  let utr = document.getElementById("utrInput").value;
  if(utr.length == 12){
    alert("UTR Submitted Successfully!");
  }else{
    alert("UTR must be 12 digits");
  }
}

</script>

</body>
</html>
