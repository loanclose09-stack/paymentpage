<!DOCTYPE html>
<html>
<head>
  <title>Payment Submit</title>
</head>
<body>

<h2>Payment Confirmation Form</h2>

<form>
  <label>Name:</label><br>
  <input type="text" placeholder="Enter your name"><br><br>

  <label>Amount:</label><br>
  <input type="number" placeholder="Enter amount"><br><br>

  <label>Payment Method:</label><br>
  <select>
    <option>Google Pay</option>
    <option>PhonePe</option>
    <option>Paytm</option>
    <option>UPI</option>
  </select><br><br>

  <label>UTR Number:</label><br>
  <input type="text" placeholder="Enter 12 digit UTR"><br><br>

  <button type="submit">Submit</button>
</form>

</body>
</html>
