<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Payment Link Generator</title>

<style>
body{
  font-family: Arial;
  background:#f2f4f8;
  padding:20px;
}
.container{
  max-width:500px;
  margin:auto;
}
.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
  margin-bottom:20px;
}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#4CAF50;
  color:white;
  font-size:16px;
  cursor:pointer;
  margin-top:10px;
}
input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ddd;
}
.link-box{
  background:#eee;
  padding:10px;
  word-break:break-all;
  border-radius:6px;
  margin-top:10px;
}
</style>
</head>
<body>

<div class="container">

<div class="card" id="adminPanel">
  <h3>Admin Panel (Demo)</h3>
  <input type="text" id="name" placeholder="Receiver Name">
  <input type="number" id="amount" placeholder="Amount">
  <input type="text" id="upi" placeholder="UPI ID">
  <button onclick="generateLink()">Generate Payment Link</button>
  <div class="link-box" id="generatedLink"></div>
</div>

<div class="card" id="paymentPage" style="display:none;">
  <h3>Complete Payment</h3>
  <p><strong>Amount:</strong> ₹<span id="pAmount"></span></p>
  <p><strong>Name:</strong> <span id="pName"></span></p>
  <p><strong>UPI ID:</strong> <span id="pUpi"></span></p>
  <button onclick="alert('Demo Mode - Payment Not Real')">Pay via UPI</button>
</div>

</div>

<script>

function generateLink(){
  const name = document.getElementById("name").value;
  const amount = document.getElementById("amount").value;
  const upi = document.getElementById("upi").value;

  const data = btoa(JSON.stringify({name,amount,upi}));

  const url = window.location.origin + "/?data=" + data;

  document.getElementById("generatedLink").innerText = url;
}

function loadPayment(){
  const params = new URLSearchParams(window.location.search);
  const data = params.get("data");

  if(data){
    document.getElementById("adminPanel").style.display = "none";
    document.getElementById("paymentPage").style.display = "block";

    const decoded = JSON.parse(atob(data));

    document.getElementById("pName").innerText = decoded.name;
    document.getElementById("pAmount").innerText = decoded.amount;
    document.getElementById("pUpi").innerText = decoded.upi;
  }
}

loadPayment();

</script>

</body>
</html>
