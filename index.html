<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Confirmation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Step 1 -->
  <div class="card">
    <div class="card-header">
      Step 1: Copy Amount and Bank Account Information
    </div>

    <div class="row">
      <span>Amount</span>
      <div>
        <b class="highlight">₹40000</b>
        <button onclick="copyText('4000')">Copy</button>
      </div>
    </div>

    <div class="row">
      <span>Name</span>
      <div>
        <b class="highlight">Md Saleem</b>
        <button onclick="copyText('Md Saleem')">Copy</button>
      </div>
    </div>

    <div class="row">
      <span>VPA/UPI</span>
      <div>
        <b class="highlight">murshad.recovery@ptyes</b>
        <button onclick="copyText('murshad.recovery@ptyes')">Copy</button>
      </div>
    </div>

    <div class="row">
      <span>Expiry Time</span>
      <b class="highlight">2026-02-23 19:19:26</b>
    </div>
  </div>

  <!-- Step 2 -->
  <div class="card">
    <div class="card-header">
      Step 2: Transfer and don't modify this amount
    </div>
    <p class="warning">⚠ Please record your Reference No. after payment</p>
  </div>

  <!-- Step 3 -->
  <div class="card">
    <div class="card-header">
      Step 3: Enter UTR to Complete Payment
    </div>

    <input type="text" placeholder="Enter 12 digit UTR" maxlength="12">
    <button class="submit-btn">Submit UTR</button>
  </div>

</div>

<script>
function copyText(text) {
  navigator.clipboard.writeText(text);
  alert("Copied: " + text);
}
</script>

</body>
</html>
