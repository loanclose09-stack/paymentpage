<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Payment</title>

<style>
body{
  font-family: 'Segoe UI', sans-serif;
  background: #f2f4f8;
  padding: 20px;
}
.container{
  max-width: 500px;
  margin: auto;
}
.card{
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
  margin-bottom: 20px;
}
.header{
  background: linear-gradient(45deg,#2196F3,#1565C0);
  color: white;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  font-size: 18px;
  margin-bottom: 15px;
}
.row{
  display:flex;
  justify-content: space-between;
  margin: 10px 0;
  align-items:center;
}
.copy-btn{
  background:#2196F3;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}
.pay-btn{
  width:100%;
  background:#4CAF50;
  color:white;
  padding:12px;
  border:none;
  border-radius:8px;
  margin-top:10px;
  font-size:16px;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="container">

<div class="card">
  <div class="header">Step 1: Complete Payment</div>

  <div class="row">
    <strong>Amount:</strong>
    <span id="amountDisplay"></span>
    <button class="copy-btn" onclick="copyText('amountDisplay')">Copy</button>
  </div>

  <div class="row">
    <strong>Name:</strong>
    <span id="nameDisplay"></span>
  </div>

  <div class="row">
    <strong>UPI ID:</strong>
    <span id="upiDisplay"></span>
    <button class="copy-btn" onclick="copyText('upiDisplay')">Copy</button>
  </div>

  <button class="pay-btn" onclick="payNow()">Pay via UPI</button>
</div>

</div>

<script>

function getParams(){
  const urlParams = new URLSearchParams(window.location.search);
  const name = urlParams.get('name') || "Your Business";
  const amount = urlParams.get('amount') || "1000";
  const upi = urlParams.get('upi') || "yourupi@bank";

  document.getElementById("nameDisplay").innerText = name;
  document.getElementById("amountDisplay").innerText = "₹" + amount;
  document.getElementById("upiDisplay").innerText = upi;
}

function copyText(id){
  let text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text);
  alert("Copied: " + text);
}

function payNow(){
  const urlParams = new URLSearchParams(window.location.search);
  const name = urlParams.get('name');
  const amount = urlParams.get('amount');
  const upi = urlParams.get('upi');

  let url = `upi://pay?pa=${upi}&pn=${name}&am=${amount}&cu=INR`;
  window.location.href = url;
}

getParams();

</script>

</body>
</html>
